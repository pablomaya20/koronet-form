<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Koronet &middot; eSuite Growers Pre-Implementation Success Form</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:#0a0a0a;color:#fff;min-height:100vh;padding-top:110px;}
#site-header{position:fixed;top:0;left:0;right:0;background:#0a0a0a;border-bottom:1px solid #2a2a2a;z-index:100;padding:0 24px;}#site-header.floating{background:transparent;border-bottom:none;position:absolute;}
.header-inner{max-width:720px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:14px 0 6px;}
.logo-wrap{display:flex;align-items:center;gap:10px;}
.logo-text{font-size:18px;font-weight:700;color:#fff;letter-spacing:-0.3px;}
.header-subtitle{font-size:12px;color:#888;text-align:center;padding-bottom:4px;}
.lang-toggle{display:flex;gap:6px;}
.lang-btn{background:transparent;border:1px solid #2a2a2a;color:#888;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;padding:4px 10px;border-radius:6px;cursor:pointer;transition:all 0.15s;}
.lang-btn.active{background:#ffffff;border-color:#ffffff;color:#000;}
.lang-btn:not(.active):hover{border-color:#555;color:#ccc;}
#progress-bar-wrap{max-width:720px;margin:0 auto;padding:8px 0 10px;}
.progress-label{font-size:12px;color:#888;margin-bottom:6px;}
.progress-track{height:4px;background:#2a2a2a;border-radius:2px;overflow:hidden;}
.progress-fill{height:100%;background:#ffffff;border-radius:2px;transition:width 0.3s ease;}
#app{max-width:720px;margin:0 auto;padding:24px 24px 60px;}#form-container{background:transparent;position:relative;z-index:10;}
.section-panel{background:#141414;border:1px solid #2a2a2a;border-radius:12px;padding:28px;margin-bottom:20px;}
.section-title{font-size:20px;font-weight:700;color:#fff;margin-bottom:20px;}
.info-box{background:rgba(255,255,255,0.05);border-left:3px solid rgba(255,255,255,0.3);border-radius:0 8px 8px 0;padding:14px 16px;margin-bottom:22px;font-size:13px;color:#aaa;line-height:1.6;}
.field{margin-bottom:18px;}
.field label,.field-label{display:block;font-size:13px;font-weight:500;color:#ccc;margin-bottom:6px;}
.req{color:rgba(255,255,255,0.6);margin-left:2px;}
input[type="text"],input[type="email"],input[type="url"],input[type="number"],input[type="tel"],textarea,select{width:100%;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:8px;color:#fff;font-family:'Inter',sans-serif;font-size:15px;padding:12px;outline:none;transition:border-color 0.15s;}
input::placeholder,textarea::placeholder{color:#444;}
input:focus,textarea:focus,select:focus{border-color:rgba(255,255,255,0.4);}
textarea{resize:vertical;min-height:90px;}
fieldset{border:none;}
legend{font-size:13px;font-weight:500;color:#ccc;margin-bottom:10px;}
.check-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
@media(max-width:500px){.check-grid{grid-template-columns:1fr;}}
.check-item,.radio-item{display:flex;align-items:center;gap:10px;cursor:pointer;padding:10px 12px;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:8px;transition:border-color 0.15s;font-size:13px;color:#ccc;user-select:none;}
.check-item:hover,.radio-item:hover{border-color:#444;}
.check-item input,.radio-item input{display:none;}
.custom-box{width:18px;height:18px;border:2px solid #444;border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
.custom-circle{width:18px;height:18px;border:2px solid #444;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
.check-item.checked .custom-box{background:#ffffff;border-color:#ffffff;}
.radio-item.checked .custom-circle{border-color:#ffffff;}
.check-item.checked,.radio-item.checked{border-color:#ffffff;color:#fff;}
.check-item.checked{background:rgba(255,255,255,0.08);}
.radio-col{display:flex;flex-direction:column;gap:8px;}
.conditional-field{margin-top:10px;display:none;}
.conditional-field.visible{display:block;}
.dyn-table{width:100%;border-collapse:collapse;margin-bottom:10px;}
.dyn-table th{text-align:left;font-size:12px;font-weight:600;color:#888;padding:6px 8px;border-bottom:1px solid #2a2a2a;}
.dyn-table td{padding:6px 4px;}
.dyn-table input{border-radius:6px;padding:9px 10px;font-size:14px;}
.dyn-table .remove-row-btn{background:transparent;border:1px solid #333;color:#666;border-radius:6px;padding:6px 10px;cursor:pointer;font-size:12px;transition:all 0.15s;}
.dyn-table .remove-row-btn:hover{border-color:#ff4444;color:#ff4444;}
.add-row-btn{background:transparent;border:1px solid rgba(255,255,255,0.4);color:#ffffff;font-family:'Inter',sans-serif;font-size:13px;font-weight:500;padding:8px 16px;border-radius:8px;cursor:pointer;transition:all 0.15s;margin-top:4px;}
.add-row-btn:hover{background:rgba(255,255,255,0.08);}
.komet-emails{display:flex;flex-direction:column;gap:8px;}
.field-error{color:#ff4444;font-size:12px;margin-top:5px;display:none;}
.field-error.visible{display:block;}
.input-error{border-color:#ff4444!important;}
.nav-buttons{display:flex;gap:12px;margin-top:28px;}
.btn-back{flex:1;background:transparent;border:1px solid #fff;color:#fff;font-family:'Inter',sans-serif;font-size:15px;font-weight:600;padding:14px;border-radius:8px;cursor:pointer;transition:all 0.15s;}
.btn-back:hover{background:rgba(255,255,255,0.07);}
.btn-next,.btn-submit{flex:2;background:#ffffff;border:none;color:#000000;font-family:'Inter',sans-serif;font-size:15px;font-weight:700;padding:14px;border-radius:8px;cursor:pointer;transition:background 0.15s;}
.btn-next:hover,.btn-submit:hover{background:rgba(255,255,255,0.88);}
.btn-next:disabled,.btn-submit:disabled{opacity:0.6;cursor:not-allowed;}
.btn-submit{flex:1;width:100%;}
#submit-error{color:#ff4444;font-size:13px;margin-top:12px;text-align:center;display:none;}
#submit-error.visible{display:block;}
#success-screen{display:none;position:fixed;inset:0;width:100vw;height:100vh;background:#080c12;z-index:100;flex-direction:column;align-items:center;justify-content:center;font-family:system-ui,-apple-system,sans-serif;overflow:hidden;}
#success-screen.visible{display:flex;}
#success-canvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;}
.success-content{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:clamp(16px,2.2vw,28px);max-width:520px;width:100%;padding:24px;text-align:center;}
.success-logo-row{display:flex;align-items:center;justify-content:center;margin-bottom:4px;}
.success-check-wrap{width:clamp(72px,9vw,96px);height:clamp(72px,9vw,96px);border-radius:50%;border:1.5px solid rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;}
.success-check-inner{width:80%;height:80%;border-radius:50%;background:rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:center;}
.success-title{font-size:clamp(32px,5vw,56px);font-weight:700;color:#ffffff;letter-spacing:-0.8px;line-height:1.15;margin:0;}
.success-sub{font-size:clamp(13px,1.3vw,16px);color:rgba(255,255,255,0.4);line-height:1.7;margin:0;max-width:400px;}
.success-divider{width:32px;height:1px;background:rgba(255,255,255,0.1);}
.success-cta-section{display:flex;flex-direction:column;align-items:center;gap:10px;width:100%;}
.success-cta-eyebrow{font-size:12px;color:rgba(255,255,255,0.55);letter-spacing:0.14em;text-transform:uppercase;}
.success-cta-btn{display:flex;align-items:center;justify-content:center;gap:10px;background:#ffffff;color:#000000;font-size:15px;font-weight:700;padding:16px 36px;border-radius:10px;text-decoration:none;width:100%;transition:all 0.25s ease;letter-spacing:0.01em;border:none;cursor:pointer;}
.success-cta-btn:hover{background:rgba(255,255,255,0.88);transform:scale(1.03);}
.success-cta-arrow{transition:transform 0.25s ease;font-size:17px;}
.success-cta-btn:hover .success-cta-arrow{transform:translateX(5px);}
.success-cta-desc{font-size:13px;color:rgba(255,255,255,0.45);line-height:1.65;}
.success-powered{font-size:9px;color:rgba(255,255,255,0.12);text-transform:uppercase;letter-spacing:0.14em;margin-top:4px;}
@media(max-width:768px){#app{padding:20px 16px 60px;}.section-panel{padding:20px;}.check-grid{grid-template-columns:1fr;}}
@media(max-width:480px){body{padding-top:120px;}.header-inner{flex-wrap:wrap;gap:8px;}.section-title{font-size:18px;}}
:focus-visible{outline:2px solid rgba(255,255,255,0.4);outline-offset:2px;}
/* -- WELCOME SCREEN -- */
#welcome-screen{display:none;position:fixed;inset:0;width:100vw;height:100vh;flex-direction:column;align-items:center;justify-content:center;text-align:center;overflow:hidden;background:#0a0a0a;z-index:0;pointer-events:none;}
#welcome-screen.vis{display:flex;}
#constellation-canvas{position:fixed;inset:0;width:100%;height:100%;z-index:0;pointer-events:none;}
.welcome-content{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;min-height:100vh;padding:80px 24px 40px;max-width:520px;width:100%;pointer-events:auto;}
.welcome-logo-wrap{display:flex;align-items:center;gap:14px;}
.welcome-logo-text{font-size:28px;font-weight:700;color:#fff;letter-spacing:-0.5px;}
.welcome-tagline{font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:#3a3a3a;margin-top:4px;}
.welcome-title-text{font-size:clamp(36px, 5vw, 64px);font-weight:700;color:#fff;line-height:1.1;letter-spacing:-1px;margin-top:0;margin-bottom:clamp(4px, 0.5vw, 8px);}
.welcome-subtitle-text{font-size:clamp(11px, 1.1vw, 15px);color:rgba(255,255,255,0.4);line-height:1.5;max-width:380px;margin-bottom:clamp(16px, 2vw, 28px);}
.squircle-row{display:flex;gap:clamp(12px, 1.5vw, 20px);align-items:center;margin-bottom:clamp(16px, 2vw, 24px);}
.sq-logo{width:clamp(52px, 6vw, 72px);height:clamp(52px, 6vw, 72px);border-radius:18px;cursor:default;transition:transform 0.5s cubic-bezier(0.34,1.56,0.64,1),box-shadow 0.3s ease;position:relative;overflow:hidden;}
.sq-logo:hover{transform:scale(1.12) translateY(-4px);box-shadow:0 12px 32px rgba(0,0,0,0.5);}
.sq-logo svg{width:100%;height:100%;display:block;}
.sq-glass{position:absolute;inset:0;background:linear-gradient(160deg,rgba(255,255,255,0.18) 0%,rgba(255,255,255,0) 55%);border-radius:18px;pointer-events:none;}
#btn-comenzar{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.13);border:1px solid rgba(255,255,255,0.42);color:#fff;font-family:'Inter',sans-serif;font-size:clamp(12px, 1.1vw, 15px);font-weight:600;padding:clamp(10px, 1.2vw, 14px) clamp(24px, 3vw, 40px);border-radius:50px;cursor:pointer;transition:background 0.2s,border-color 0.2s,box-shadow 0.2s,transform 0.2s;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);}
#btn-comenzar:hover{background:rgba(255,255,255,0.18);border-color:rgba(255,255,255,0.7);box-shadow:0 0 24px rgba(255,255,255,0.2),0 0 48px rgba(255,255,255,0.08);transform:translateY(-2px);}
#btn-comenzar:focus-visible{outline:2px solid rgba(255,255,255,0.4);outline-offset:3px;}
#btn-comenzar .btn-arrow{transition:transform 0.2s ease;}
#btn-comenzar:hover .btn-arrow{transform:translateX(5px);}
.welcome-powered{position:absolute;bottom:18px;left:0;right:0;text-align:center;font-size:10px;color:rgba(255,255,255,0.18);letter-spacing:0.08em;}
.sub-item{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:default;}.gem{position:relative;transition:transform 0.35s cubic-bezier(0.34,1.56,0.64,1);}.sub-item:hover .gem{transform:scale(1.12) translateY(-4px);}.glow-outer{position:absolute;width:90px;height:90px;border-radius:50%;z-index:0;top:50%;left:50%;transform:translate(-50%,-50%);filter:blur(8px);transition:transform 0.35s ease;}.sub-item:hover .glow-outer{transform:translate(-50%,-50%) scale(1.3);}.glow-inner{position:absolute;width:50px;height:50px;border-radius:50%;z-index:0;top:50%;left:50%;transform:translate(-50%,-50%);filter:blur(4px);}.gem svg{position:relative;z-index:1;display:block;}.sub-name{font-size:clamp(8px,0.75vw,10px);color:rgba(255,255,255,0.25);letter-spacing:0.12em;text-transform:uppercase;transition:color 0.3s;}.sub-item:hover .sub-name{color:rgba(255,255,255,0.55);}#prep-screen{position:fixed;inset:0;width:100vw;height:100vh;overflow-y:auto;display:none;z-index:10;}.prep-inner{max-width:780px;margin:0 auto;padding:90px 24px 80px;display:flex;flex-direction:column;align-items:center;gap:20px;}.prep-badge{display:inline-block;border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.4);font-size:10px;letter-spacing:0.1em;text-transform:uppercase;padding:5px 14px;border-radius:50px;}.prep-title{font-size:30px;font-weight:700;color:#fff;text-align:center;margin:0;}.prep-subtitle-row{display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:10px;text-align:center;}.prep-subtitle-text{font-size:13px;color:rgba(255,255,255,0.4);line-height:1.5;}.prep-time-pill{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.8);font-size:11px;font-weight:600;padding:3px 10px;border-radius:50px;white-space:nowrap;}.prep-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;}@media(max-width:520px){.prep-grid{grid-template-columns:1fr;}}.prep-card{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:16px 18px;display:flex;gap:14px;align-items:flex-start;transition:all 0.25s ease;width:100%;box-sizing:border-box;}.prep-card:hover{background:rgba(255,255,255,0.07);border-color:rgba(255,255,255,0.18);transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,0.3);}.prep-card-full{width:100%;}.prep-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}.prep-card-title{font-size:13px;font-weight:600;color:#fff;margin-bottom:8px;}.prep-card-note{font-size:10px;color:rgba(255,255,255,0.3);font-style:italic;font-weight:400;}.prep-card-items{font-size:11px;color:rgba(255,255,255,0.5);line-height:1.75;}.prep-conf{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.12);border-radius:12px;padding:14px 18px;display:flex;gap:12px;align-items:center;width:100%;}.prep-lock{font-size:22px;flex-shrink:0;}.prep-conf-text{font-size:12px;color:rgba(255,255,255,0.45);line-height:1.5;}.prep-conf-text b{color:rgba(255,255,255,0.8);}.prep-conf-text b{color:rgba(255,255,255,0.65);font-weight:600;}.btn-prep-start{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.13);border:1px solid rgba(255,255,255,0.42);color:#fff;font-family:'Inter',sans-serif;font-size:15px;font-weight:600;padding:14px 36px;border-radius:50px;cursor:pointer;transition:background 0.2s,border-color 0.2s,transform 0.2s;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);margin-top:4px;}.btn-prep-start:hover{background:rgba(255,255,255,0.2);border-color:rgba(255,255,255,0.65);transform:scale(1.04);}.btn-prep-start .btn-arrow{transition:transform 0.2s ease;}.btn-prep-start:hover .btn-arrow{transform:translateX(4px);}</style>
</head>

function showErr(k,msg){var el=document.getElementById("err-"+k);var i=document.getElementById(k);if(el){el.textContent=msg;el.classList.add("visible");}if(i)i.classList.add("input-error");}
function clrErr(k){var el=document.getElementById("err-"+k);var i=document.getElementById(k);if(el){el.textContent="";el.classList.remove("visible");}if(i)i.classList.remove("input-error");}
function isEmail(v){return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);}
function isUrl(v){try{new URL(v);return true;}catch(e){return false;}}
function validate(n){
  var ok=true,f=state.f,tl=state.lang;
  function rt(k){clrErr(k);if(!f[k]||!String(f[k]).trim()){showErr(k,T[tl].required);ok=false;}}
  function re(k){clrErr(k);var v=f[k]||"";if(!v.trim()){showErr(k,T[tl].required);ok=false;}else if(!isEmail(v)){showErr(k,T[tl].emailInvalid);ok=false;}}
  function ou(k){clrErr(k);var v=f[k]||"";if(v.trim()&&!isUrl(v)){showErr(k,T[tl].urlInvalid);ok=false;}}
  function rc(k){clrErr(k);if(!f[k]||!f[k].length){showErr(k,T[tl].atLeastOne);ok=false;}}
  function rr(k){clrErr(k);if(!f[k]){showErr(k,T[tl].required);ok=false;}}
  switch(n){
    case 1:
      rt("farm_name");rt("country_city");ou("website");
      ["founded_year","employees_count","production_hectares"].forEach(function(k){clrErr(k);var v=f[k];if(v&&(isNaN(v)||parseFloat(v)<0)){showErr(k,T[tl].numberInvalid);ok=false;}});
      clrErr("fixed_order_pct");var p=f.fixed_order_pct;if(p&&(isNaN(p)||parseFloat(p)<0||parseFloat(p)>100)){showErr("fixed_order_pct",T[tl].pctInvalid);ok=false;}
      break;
    case 2:
      rc("main_goals");
      if(f.main_goals.indexOf("otro")!==-1&&!f.main_goals_other.trim()){showErr("main_goals_other",T[tl].otherRequired);ok=false;}else clrErr("main_goals_other");
      rr("new_buyers_30d");break;
    case 3:rt("admin_name");re("admin_email");rr("admin_hours");break;
    case 4:rr("operation_mode");break;
    case 5:
      clrErr("species_varieties");
      if(!f.species_varieties.some(function(r){return r.species.trim();})){showErr("species_varieties",T[tl].atLeastOneRow);ok=false;}
      if(f.certifications.indexOf("cert_other")!==-1&&!f.cert_other.trim()){showErr("cert_other",T[tl].otherRequired);ok=false;}else clrErr("cert_other");
      if(f.certifications.indexOf("association_other")!==-1&&!f.association_other.trim()){showErr("association_other",T[tl].otherRequired);ok=false;}else clrErr("association_other");
      break;
    case 6:
      rr("inventory_weeks");
      if(f.inventory_weeks==="otro"&&!f.inventory_weeks_other.trim()){showErr("inventory_weeks_other",T[tl].otherRequired);ok=false;}else clrErr("inventory_weeks_other");
      break;
    case 7:
      rr("has_komet_clients");
      if(f.payment_methods.indexOf("otro")!==-1&&!f.payment_methods_other.trim()){showErr("payment_methods_other",T[tl].otherRequired);ok=false;}else clrErr("payment_methods_other");
      if(f.flexible_conditions.indexOf("otro")!==-1&&!f.flexible_conditions_other.trim()){showErr("flexible_conditions_other",T[tl].otherRequired);ok=false;}else clrErr("flexible_conditions_other");
      if(f.has_us_account==="yes"&&!f.us_bank_details.trim()){showErr("us_bank_details",T[tl].required);ok=false;}else clrErr("us_bank_details");
      break;
    case 8:
      rt("operational_pain");
      if(f.current_systems.indexOf("otro")!==-1&&!f.current_systems_other.trim()){showErr("current_systems_other",T[tl].otherRequired);ok=false;}else clrErr("current_systems_other");
      break;
  }
  return ok;
}
function syncConds(){
  var f=state.f;
  tog("main_goals_other",f.main_goals.indexOf("otro")!==-1);
  tog("cert_other",f.certifications.indexOf("cert_other")!==-1);
  tog("association_other",f.certifications.indexOf("association_other")!==-1);
  tog("inventory_weeks_other",f.inventory_weeks==="otro");
  tog("komet_client_emails",f.has_komet_clients==="yes");
  tog("payment_methods_other",f.payment_methods.indexOf("otro")!==-1);
  tog("flexible_conditions_other",f.flexible_conditions.indexOf("otro")!==-1);
  tog("us_bank_details",f.has_us_account==="yes");
  tog("current_systems_other",f.current_systems.indexOf("otro")!==-1);
}

function bindEvents(n){
  var bn=document.getElementById("btn-next");
  var bb=document.getElementById("btn-back");
  var bs=document.getElementById("btn-submit");
  if(bn)bn.addEventListener("click",goNext);
  if(bb)bb.addEventListener("click",goBack);
  if(bs)bs.addEventListener("click",handleSubmit);
  document.querySelectorAll("input[type=\"text\"],input[type=\"email\"],input[type=\"url\"],input[type=\"number\"],input[type=\"tel\"],textarea").forEach(function(el){
    if(el.dataset.dyn||el.dataset.ki!==undefined)return;
    var k=el.id||el.name;if(!k)return;
    el.addEventListener("input",function(){state.f[k]=el.value;clrErr(k);});
  });
  document.querySelectorAll(".check-item").forEach(function(lbl){
    lbl.setAttribute("tabindex","0");
    lbl.addEventListener("click",function(e){
      if(e.target.tagName==="INPUT")return;
      var name=lbl.dataset.name,val=lbl.dataset.val;
      var arr=state.f[name]||[];var idx=arr.indexOf(val);
      if(idx===-1){arr.push(val);lbl.classList.add("checked");}else{arr.splice(idx,1);lbl.classList.remove("checked");}
      state.f[name]=arr;updChk(lbl,arr.indexOf(val)!==-1);clrErr(name);syncConds();
    });
    lbl.addEventListener("keydown",function(e){if(e.key===" "||e.key==="Enter"){e.preventDefault();lbl.click();}});
  });
  document.querySelectorAll(".radio-item").forEach(function(lbl){
    lbl.setAttribute("tabindex","0");
    lbl.addEventListener("click",function(e){
      if(e.target.tagName==="INPUT")return;
      var name=lbl.dataset.name,val=lbl.dataset.val;
      state.f[name]=val;
      document.querySelectorAll(".radio-item[data-name=\""+name+"\"]").forEach(function(l){l.classList.remove("checked");var c=l.querySelector(".custom-circle");if(c)c.innerHTML="";l.setAttribute("aria-checked","false");});
      lbl.classList.add("checked");
      var circ=lbl.querySelector(".custom-circle");
      if(circ)circ.innerHTML="<span style=\"width:8px;height:8px;background:#ffffff;border-radius:50%;display:inline-block\"></span>";
      lbl.setAttribute("aria-checked","true");clrErr(name);syncConds();
    });
    lbl.addEventListener("keydown",function(e){if(e.key===" "||e.key==="Enter"){e.preventDefault();lbl.click();}});
  });
  if(n===5){
    bindSpTbl();
    var addSp=document.getElementById("add-sp");
    if(addSp)addSp.addEventListener("click",function(){state.f.species_varieties.push({species:"",varieties:""});refreshSp();});
  }
  if(n===7){
    bindOcTbl();
    var addOc=document.getElementById("add-oc");
    if(addOc)addOc.addEventListener("click",function(){state.f.outside_network_clients.push({company:"",role:""});refreshOc();});
    document.querySelectorAll("[data-ki]").forEach(function(el){el.addEventListener("input",function(){state.f.komet_client_emails[parseInt(el.dataset.ki)]=el.value;});});
  }
}

var _csRaf=null,_csResize=null,_scRaf=null,_scResize=null;
function stopConstellation(){
  if(_csRaf){cancelAnimationFrame(_csRaf);_csRaf=null;}
  if(_csResize){window.removeEventListener("resize",_csResize);_csResize=null;}
}
function startConstellation(){
  var canvas=document.getElementById("constellation-canvas");
  if(!canvas)return;
  var ctx=canvas.getContext("2d");
  var W,H,dpr;
  var N=80,BASE_DIST=0.14,NEW_MIN=0.12,NEW_MAX=0.32,MAX_ACTIVE=12,frame=0;
  var pts=[],active=[];
  function resize(){
    dpr=window.devicePixelRatio||1;
    W=window.innerWidth;H=window.innerHeight;
    canvas.width=W*dpr;canvas.height=H*dpr;
    ctx.scale(dpr,dpr);
  }
  function initPts(){
    pts=[];
    for(var i=0;i<N;i++){pts.push({x:Math.random(),y:Math.random(),vx:(Math.random()-0.5)*0.0003,vy:(Math.random()-0.5)*0.0003,teal:i%6===0});}
  }
  function pdist(a,b){var dx=a.x-b.x,dy=a.y-b.y;return Math.sqrt(dx*dx+dy*dy);}
  function drawBase(){
    for(var i=0;i<N;i++){
      for(var j=i+1;j<N;j++){
        var d=pdist(pts[i],pts[j]);
        if(d<BASE_DIST){
          ctx.beginPath();ctx.moveTo(pts[i].x*W,pts[i].y*H);ctx.lineTo(pts[j].x*W,pts[j].y*H);
          ctx.strokeStyle="rgba(255,255,255,0.07)";
          ctx.lineWidth=0.5;ctx.stroke();
        }
      }
    }
  }
  function spawnActive(){
    if(active.length>=MAX_ACTIVE)return;
    var idx=Math.floor(Math.random()*N),cands=[];
    for(var j=0;j<N;j++){
      if(j===idx)continue;
      var d=pdist(pts[idx],pts[j]);
      if(d>=NEW_MIN&&d<=NEW_MAX)cands.push(j);
    }
    if(!cands.length)return;
    active.push({from:idx,to:cands[Math.floor(Math.random()*cands.length)],prog:0,drawF:80,life:260+Math.floor(Math.random()*200)});
  }
  var reduced=window.matchMedia("(prefers-reduced-motion:reduce)").matches;
  resize();initPts();
  if(reduced){
    ctx.clearRect(0,0,W,H);drawBase();
    for(var i=0;i<N;i++){
      ctx.beginPath();ctx.arc(pts[i].x*W,pts[i].y*H,1.4,0,Math.PI*2);
      ctx.fillStyle="rgba(255,255,255,0.35)";ctx.fill();
    }
    return;
  }
  function tick(){
    if(state.cur!==0){_csRaf=null;return;}
    _csRaf=requestAnimationFrame(tick);frame++;
    ctx.clearRect(0,0,W,H);
    for(var i=0;i<N;i++){
      pts[i].x+=pts[i].vx;pts[i].y+=pts[i].vy;
      if(pts[i].x<0||pts[i].x>1)pts[i].vx*=-1;
      if(pts[i].y<0||pts[i].y>1)pts[i].vy*=-1;
    }
    drawBase();
    if(frame%55===0)spawnActive();
    var toRemove=[];
    for(var k=0;k<active.length;k++){
      var ac=active[k];ac.prog++;
      if(ac.prog>=ac.life){toRemove.push(k);continue;}
      var dp=Math.min(1,ac.prog/ac.drawF);
      var age=ac.prog/ac.life;
      var op=Math.sin(age*Math.PI)*0.9;
      var ax=pts[ac.from].x*W,ay=pts[ac.from].y*H;
      var bx=pts[ac.to].x*W,by=pts[ac.to].y*H;
      var ex=ax+(bx-ax)*dp,ey=ay+(by-ay)*dp;
      ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(ex,ey);
      ctx.strokeStyle="rgba(255,255,255,"+op.toFixed(3)+")";
      ctx.lineWidth=1.2;ctx.stroke();
      if(dp<1){
        ctx.beginPath();ctx.arc(ex,ey,2*dp,0,Math.PI*2);
        ctx.fillStyle="rgba(255,255,255,"+(op*0.9).toFixed(3)+")";ctx.fill();
      }
    }
    for(var ri=toRemove.length-1;ri>=0;ri--)active.splice(toRemove[ri],1);
    var aset={};
    for(var k=0;k<active.length;k++){aset[active[k].from]=1;aset[active[k].to]=1;}
    for(var i=0;i<N;i++){
      var ia=aset[i];
      var r2=ia?2.2:1.4;
      ctx.beginPath();ctx.arc(pts[i].x*W,pts[i].y*H,r2,0,Math.PI*2);
      ctx.fillStyle=ia?"rgba(255,255,255,0.9)":"rgba(255,255,255,0.35)";
      ctx.fill();
    }
  }
  tick();
  _csResize=function(){resize();};
  window.addEventListener("resize",_csResize);
}

function handleWelcomeClick(){
  var ws=document.getElementById("welcome-screen");
  var wc=ws?ws.querySelector(".welcome-content"):null;
  var ps=document.getElementById("prep-screen");
  if(wc){wc.style.transition="opacity 0.3s ease,transform 0.3s ease";wc.style.opacity="0";wc.style.transform="translateY(-20px)";}
  setTimeout(function(){
    if(wc){wc.style.display="none";wc.style.opacity="";wc.style.transform="";wc.style.transition="";}
    state.cur=-1;
    var sh=document.getElementById("site-header");if(sh)sh.classList.remove("floating");
    renderPrep();
    ps.style.display="block";ps.style.opacity="0";ps.style.transform="translateY(16px)";
    ps.style.transition="opacity 0.3s ease,transform 0.3s ease";
    requestAnimationFrame(function(){requestAnimationFrame(function(){
      ps.style.opacity="1";ps.style.transform="translateY(0)";
      setTimeout(function(){ps.style.opacity="";ps.style.transform="";ps.style.transition="";},320);
    });});
    window.scrollTo({top:0,behavior:"smooth"});
  },300);
}
function handlePrepClick(){
  var ps=document.getElementById("prep-screen");
  var ws=document.getElementById("welcome-screen");
  var fc=document.getElementById("form-container");
  var pw=document.getElementById("progress-bar-wrap");
  ps.style.transition="opacity 0.3s ease,transform 0.3s ease";
  ps.style.opacity="0";ps.style.transform="translateY(-16px)";
  setTimeout(function(){
    ps.style.display="none";ps.style.opacity="";ps.style.transform="";ps.style.transition="";
    stopConstellation();
    state.cur=1;
    if(pw)pw.style.display="";
    fc.style.opacity="0";fc.style.transform="translateY(20px)";
    fc.style.transition="opacity 0.3s ease,transform 0.3s ease";
    renderSection(1);renderProgress();
    requestAnimationFrame(function(){requestAnimationFrame(function(){
      fc.style.opacity="1";fc.style.transform="translateY(0)";
      setTimeout(function(){fc.style.opacity="";fc.style.transform="";fc.style.transition="";},320);
    });});
    window.scrollTo({top:0,behavior:"smooth"});
  },300);
}
function renderPrep(){
  var ps=document.getElementById("prep-screen");
  if(!ps)return;
  function card(iconBg,icon,tK,noteK,itemsK,full){
    var note=noteK?(' <span class="prep-card-note">— '+t(noteK)+'</span>'):"";
    var items=t(itemsK).map(function(s){return '<div class="prep-card-item">• '+s+'</div>';}).join("");
    return '<div class="prep-card'+(full?' prep-card-full':'')+'"><div class="prep-icon" style="background:'+iconBg+'">'+icon+'</div><div><div class="prep-card-title">'+t(tK)+note+'</div><div class="prep-card-items">'+items+'</div></div></div>';
  }
  var clock='<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="5" stroke="rgba(255,255,255,0.6)" stroke-width="1.2"/><path d="M6 3.5V6l1.5 1.5" stroke="rgba(255,255,255,0.6)" stroke-width="1.2" stroke-linecap="round"/></svg>';
  var arrow='<svg class="btn-arrow" width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M4 9h10M10 5l4 4-4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>';
  ps.innerHTML=
    '<div class="prep-inner">'+
    '<span class="prep-badge">'+t("prep_badge")+'</span>'+
    '<h2 class="prep-title">'+t("prep_title")+'</h2>'+

    '<span class="prep-time-pill">'+clock+'~20 min</span></div>'+

    card('rgba(255,255,255,0.08)','📦','prep_card1_title',null,'prep_card1_items',false)+

    '<button type="button" id="btn-prep-start" class="btn-prep-start">'+t("prep_btn")+arrow+'</button>'+
    '</div>';
  document.getElementById("btn-prep-start").addEventListener("click",handlePrepClick);
}
